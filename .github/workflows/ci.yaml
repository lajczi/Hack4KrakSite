name: CI
on: 
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: postgres://backend:password@localhost:5432/hack4krak
  CARGO_TERM_COLOR: always
  # Make sure CI fails on all warnings, including Clippy lints
  RUSTFLAGS: "-Dwarnings"


jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: |
          bun frontend:install --frozen-lockfile

      - name: Run lint
        run: bun frontend:lint

      - name: Run type checks
        run: bun frontend:typecheck

      - name: Run tests
        run: bun frontend:test

      - name: Get installed Playwright version for cache key
        run: echo "PLAYWRIGHT_VERSION=$(yq eval '.version' --output-format=yaml ./node_modules/@playwright/test/package.json)" >> $GITHUB_ENV

      - name: Cache Playwright binaries
        uses: actions/cache@v5
        id: playwright-browser-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Prepare for e2e tests
        run: bunx playwright install chromium --with-deps
        if: steps.playwright-browser-cache.outputs.cache-hit != 'true'

      - name: Build frontend
        run: bun frontend:build

      - name: Run e2e tests
        run: bun frontend:e2e

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: satackey/action-docker-layer-caching@v0.0.11
        continue-on-error: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-src-dir: backend

      - name: Install cargo-llvm-cov
        if: github.ref == 'refs/heads/master'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install dependencies
        run: cargo build --locked
        working-directory: backend

      - name: Verify if openapi is up to date
        run: cargo run -p openapi-cli
        working-directory: backend

      - name: Run tests
        if: github.ref != 'refs/heads/master'
        run: cargo test --features=full-test-suite
        working-directory: backend

      - name: Run tests with coverage
        if: github.ref == 'refs/heads/master'
        run: cargo llvm-cov --features=full-test-suite --lcov --output-path lcov.info
        working-directory: backend

      - name: Log coverage summary
        if: github.ref == 'refs/heads/master'
        run: cargo llvm-cov report
        working-directory: backend

      - name: Upload backend coverage to Codecov
        if: github.ref == 'refs/heads/master'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/lcov.info
          flags: backend
          fail_ci_if_error: true

      - name: Run lint
        run: cargo fmt && cargo clippy
        working-directory: backend
